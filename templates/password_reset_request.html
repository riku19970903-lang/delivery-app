{% extends "base.html" %}
{% block content %}
<section class="panel login">
  <h1>パスワード再設定</h1>
  {% if error %}<p class="alert">{{ error }}</p>{% endif %}
  {% if message %}<p class="success">{{ message }}</p>{% endif %}
  <form method="post" action="/password-reset/request" class="formgrid">
    <label>登録メールアドレス<input type="email" name="email" required autocomplete="email"></label>
    <button class="primary">再設定リンクを発行</button>
  </form>
  <p class="hint"><a href="/login">ログイン画面へ戻る</a></p>
</section>
{% endblock %}
