<div class="tablewrap"><table><tr><th>名前</th><th>日付</th><th>完了</th><th>転送</th><th>夜間</th><th>集荷</th><th>大型</th><th>点検表</th></tr>
{% for d in deliveries or rows %}
<tr><td>{{ d.name }}</td><td>{{ d.work_date }}</td><td>{{ d.completed }}</td><td>{{ d.transfer }}</td><td>{{ d.night }}</td><td>{{ d.pickup }}</td><td>{{ d.large }}</td><td>{% if d.image_available %}<a class="button mini-button" href="{{ d.image_view_url }}" target="_blank">点検表を見る</a><br><span class="success mini-badge">画像あり</span>{% elif d.image_missing %}<span class="alert mini-badge">{{ d.image_label }}</span>{% else %}<span class="hint mini-badge">画像なし</span>{% endif %}</td></tr>
{% else %}<tr><td colspan="8">まだ入力がありません。</td></tr>{% endfor %}</table></div>
