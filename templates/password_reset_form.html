{% extends "base.html" %}
{% block content %}
<section class="panel login">
  <h1>新しいパスワード</h1>
  {% if error %}<p class="alert">{{ error }}</p>{% endif %}
  {% if message %}<p class="success">{{ message }}</p>{% endif %}
  {% if token %}
  <form method="post" action="/password-reset/{{ token }}" class="formgrid">
    <label>新しいパスワード<input type="password" name="new_password" required autocomplete="new-password"></label>
    <label>確認入力<input type="password" name="confirm_password" required autocomplete="new-password"></label>
    <button class="primary">パスワードを変更</button>
  </form>
  {% endif %}
  <p class="hint"><a href="/login">ログイン画面へ戻る</a></p>
</section>
{% endblock %}
