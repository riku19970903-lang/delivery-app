{% extends "base.html" %}
{% block content %}
<h1>出退勤・点呼・安全確認</h1>
<form method="post" class="panel formgrid">
  <label>日付<input type="date" name="work_date" value="{{ today }}" required></label>
  <label>出勤/退勤<select name="log_type"><option value="start">出勤</option><option value="end">退勤</option></select></label>
  <label>日時<input type="datetime-local" name="logged_at" required></label>
  <label>アルコールチェック結果<input name="alcohol_result" placeholder="例: 0.00mg/L" required></label>
  <label>検知器使用<select name="detector_used"><option>有</option><option>無</option></select></label>
  <label>酒気帯び<select name="intoxicated"><option>無</option><option>有</option></select></label>
  <label>体調状態<select name="health_status"><option>良好</option><option>注意</option><option>不調</option></select></label>
  <label>顔色<select name="face_check"><option>問題なし</option><option>要確認</option></select></label>
  <label>呼気<select name="breath_check"><option>問題なし</option><option>要確認</option></select></label>
  <label>声の調子<select name="voice_check"><option>問題なし</option><option>要確認</option></select></label>
  <label>管理者確認欄<input name="admin_confirm" placeholder="確認者名など"></label>
  <label>備考<textarea name="notes"></textarea></label>
  <button class="primary">記録する</button>
</form>
<section class="panel tablewrap"><h2>自分の記録</h2><table><tr><th>日時</th><th>区分</th><th>検知器</th><th>酒気</th><th>体調</th><th>備考</th></tr>
{% for l in logs %}<tr><td>{{ l.logged_at }}</td><td>{{ "出勤" if l.log_type == "start" else "退勤" }}</td><td>{{ l.detector_used }}</td><td>{{ l.intoxicated }}</td><td>{{ l.health_status }}</td><td>{{ l.notes }}</td></tr>{% endfor %}
</table></section>
{% endblock %}
