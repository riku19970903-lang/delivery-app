{% extends "base.html" %}
{% block content %}
<section class="flow-shell field-terminal">
  <div class="flow-page-head end-flow-head">
    <p class="flow-eyebrow">退勤フロー</p>
    <h1>退勤する</h1>
    <p>走行距離、配達個数、アルコールチェックの順番で登録します。</p>
  </div>

  <form id="mobile-end-form" method="post" action="/mobile/work/end" class="flow-card flow-step-form" enctype="multipart/form-data">
    <input type="hidden" name="work_date" value="{{ work_date }}">
    <input type="hidden" name="log_date" value="{{ work_date }}">

    <div class="flow-step active" data-step="1">
      <span class="step-count">STEP 1 / 3</span>
      <h2>本日の最終走行距離</h2>
      {% if vehicles %}
      <label>今日使った車両
        <select name="vehicle_id">
          {% for vehicle in vehicles %}
          <option value="{{ vehicle.id }}" {% if selected_vehicle and vehicle.id == selected_vehicle.id %}selected{% endif %}>{{ vehicle.name }}{% if vehicle.plate_number %}（{{ vehicle.plate_number }}）{% endif %}</option>
          {% endfor %}
        </select>
      </label>
      {% else %}
      <input type="hidden" name="vehicle_id" value="0">
      <p class="alert">車両が未登録です。管理者に車両登録を依頼してください。</p>
      {% endif %}
      <label>最終走行距離
        <input type="number" name="odometer" value="{{ last_odometer if last_odometer else '' }}" min="0" inputmode="numeric" placeholder="例：12580" required>
      </label>
      <button type="button" class="flow-next">次へ</button>
    </div>

    <div class="flow-step" data-step="2">
      <span class="step-count">STEP 2 / 3</span>
      <h2>配達個数</h2>
      <div class="flow-count-grid">
        <label>完了<input type="number" name="completed" value="{{ counts.completed }}" min="0" inputmode="numeric"></label>
        <label>転送<input type="number" name="transfer" value="{{ counts.transfer }}" min="0" inputmode="numeric"></label>
        <label>夜間<input type="number" name="night" value="{{ counts.night }}" min="0" inputmode="numeric"></label>
        <label>集荷<input type="number" name="pickup" value="{{ counts.pickup }}" min="0" inputmode="numeric"></label>
        <label>大型<input type="number" name="large" value="{{ counts.large }}" min="0" inputmode="numeric"></label>
      </div>
      <div class="inspection-lite">
        <label>点検表写真（任意）
          <input id="mobile-inspection-image" type="file" name="inspection_image" accept="image/jpeg,image/png,image/webp" capture="environment">
        </label>
        <small>写真を選んだ場合だけ、OCR確認画面で手直しできます。</small>
        <img id="mobile-inspection-preview" class="thumb large-thumb hidden" alt="点検表プレビュー">
      </div>
      <div class="flow-actions">
        <button type="button" class="flow-back">戻る</button>
        <button type="button" class="flow-next">次へ</button>
      </div>
    </div>

    <div class="flow-step" data-step="3">
      <span class="step-count">STEP 3 / 3</span>
      <h2>アルコールチェック</h2>
      <label>退勤時刻
        <input type="datetime-local" name="logged_at" value="{{ logged_at }}" required>
      </label>
      <label>アルコール結果
        <input name="alcohol_result" value="0.00" placeholder="例：0.00 / OK" required>
      </label>
      <label>検知器使用
        <select name="detector_used">
          <option>有</option>
          <option>無</option>
        </select>
      </label>
      <label>メモ
        <textarea name="notes" placeholder="必要な時だけ入力"></textarea>
      </label>
      <div class="flow-actions">
        <button type="button" class="flow-back">戻る</button>
        <button class="flow-submit end">退勤登録</button>
      </div>
    </div>
  </form>
</section>

<script>
  document.querySelectorAll(".flow-step-form").forEach((form) => {
    const steps = [...form.querySelectorAll(".flow-step")];
    const imageInput = document.getElementById("mobile-inspection-image");
    let index = 0;
    const show = () => steps.forEach((step, i) => step.classList.toggle("active", i === index));
    form.querySelectorAll(".flow-next").forEach((button) => button.addEventListener("click", () => {
      const currentInputs = [...steps[index].querySelectorAll("input, select, textarea")];
      if (currentInputs.some((input) => !input.reportValidity())) return;
      index = Math.min(index + 1, steps.length - 1);
      show();
      window.scrollTo({top: 0, behavior: "smooth"});
    }));
    form.querySelectorAll(".flow-back").forEach((button) => button.addEventListener("click", () => {
      index = Math.max(index - 1, 0);
      show();
      window.scrollTo({top: 0, behavior: "smooth"});
    }));
    form.addEventListener("submit", () => {
      if (form.dataset.saving === "1") return;
      form.action = imageInput && imageInput.files && imageInput.files.length ? "/mobile/work/end/preview" : "/mobile/work/end";
      form.dataset.saving = "1";
      form.querySelectorAll("button").forEach((button) => {
        button.disabled = true;
        if (button.type !== "button") button.textContent = "保存中...";
      });
    });
  });

  const imageInput = document.getElementById("mobile-inspection-image");
  const preview = document.getElementById("mobile-inspection-preview");
  if (imageInput && preview) {
    imageInput.addEventListener("change", () => {
      const file = imageInput.files && imageInput.files[0];
      if (!file) return;
      preview.src = URL.createObjectURL(file);
      preview.classList.remove("hidden");
    });
  }
</script>
{% endblock %}
